openapi: 3.1.0
info:
  title: openleash API
  description: |
    Local-first authorization and cryptographic proof sidecar for AI agents.

    OpenLeash evaluates YAML-based policies against agent action requests and,
    when an action is allowed, issues PASETO v4.public proof tokens that
    counterparties can verify offline or online.

    ## Authentication

    The API uses four security zones:

    - **Public** — No authentication. Health checks, public key distribution,
      proof verification, and the playground.
    - **Agent** — Ed25519 request signing via five headers (`X-Agent-Id`,
      `X-Timestamp`, `X-Nonce`, `X-Body-Sha256`, `X-Signature`). Used for
      `/v1/authorize` and `/v1/agent/*` endpoints.
    - **Owner** — PASETO v4.public session token via `Authorization: Bearer`
      header (or `openleash_session` cookie for GUI). Issued on login.
      Used for all `/v1/owner/*` endpoints.
    - **Admin** — Bearer token and/or localhost check depending on the
      `admin.mode` setting (`localhost`, `token`, or `localhost_or_token`).
      Used for all `/v1/admin/*` endpoints.

    ## Typical flow

    1. An admin creates an **owner** via the Admin API and generates a
       **setup invite**.
    2. The owner completes setup (`POST /v1/owner/setup`) with the invite
       token and a passphrase, then logs in (`POST /v1/owner/login`).
    3. The owner creates **policies** via the Owner API.
    4. An agent calls `/v1/agents/registration-challenge` then
       `/v1/agents/register` to prove key ownership and register itself.
    5. The agent signs action requests and calls `/v1/authorize` to receive
       an authorization decision and, if allowed, a PASETO proof token.
    6. If the decision is `REQUIRE_APPROVAL`, the agent creates an approval
       request (`POST /v1/agent/approval-requests`), the owner approves it,
       and the agent re-authorizes with the approval token.
    7. A counterparty verifies the proof token via `/v1/verify-proof` or
       offline using the public keys from `/v1/public-keys`.
  version: 0.4.0
  license:
    name: Apache-2.0
    url: https://github.com/openleash/openleash/blob/main/LICENSE

servers:
  - url: http://127.0.0.1:8787
    description: Local development

tags:
  - name: Public
    description: Unauthenticated endpoints for health, key distribution, and proof verification.
  - name: Agent
    description: Endpoints called by AI agents. Registration is unauthenticated; authorization and self-service require Ed25519 request signing.
  - name: Owner
    description: Owner-scoped endpoints for managing agents, policies, and approval requests. Authenticated via PASETO session token.
  - name: Admin
    description: Server management endpoints protected by Bearer token and/or localhost check.
  - name: Playground
    description: Sandbox endpoint for testing policy evaluation without real agents or state.

paths:
  # ── Public ──────────────────────────────────────────────────────────

  /v1/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Public]
      description: |
        Lightweight liveness probe for load balancers and monitoring.
        Returns the server status, current time, and package version.
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status, time, version]
                properties:
                  status:
                    type: string
                    example: ok
                  time:
                    type: string
                    format: date-time
                    description: Current server time in ISO 8601 format.
                  version:
                    type: string
                    description: Package version from `package.json`.

  /v1/public-keys:
    get:
      summary: Get public keys
      operationId: getPublicKeys
      tags: [Public]
      description: |
        Returns all Ed25519 public keys the server uses (or has used) to
        sign PASETO proof tokens. Counterparties should fetch this
        periodically and cache the keys for offline verification.

        The response includes both active and revoked keys so verifiers
        can still validate tokens signed before a key rotation.
      responses:
        "200":
          description: List of public keys.
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicKey"

  /v1/verify-proof:
    post:
      summary: Verify a proof token (online)
      operationId: verifyProof
      tags: [Public]
      description: |
        Verifies a PASETO v4.public proof token against the server's
        signing keys. This is the **online** verification path — the
        server checks the signature, expiration, and optionally matches
        the `action_hash` and `agent_id` against expected values.

        For **offline** verification, use the SDK's `verifyProofOffline()`
        with keys fetched from `/v1/public-keys`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The PASETO v4.public token string (starts with `v4.public.`).
                expected_action_hash:
                  type: string
                  description: If provided, the server checks that the token's `action_hash` claim matches.
                expected_agent_id:
                  type: string
                  description: If provided, the server checks that the token's `agent_id` claim matches.
      responses:
        "200":
          description: Verification result.
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid:
                    type: boolean
                    description: Whether the token is valid and all checks passed.
                  reason:
                    type: string
                    description: Human-readable reason if `valid` is false.
                  claims:
                    type: object
                    description: Decoded token claims (present when `valid` is true).

  /v1/reference:
    get:
      summary: Scalar API Reference UI
      operationId: getReference
      tags: [Public]
      description: |
        Interactive API reference documentation rendered by Scalar.
        Serves an HTML page; not a JSON endpoint.
      responses:
        "200":
          description: HTML page with interactive API reference.

  # ── Agent ───────────────────────────────────────────────────────────

  /v1/agents/registration-challenge:
    post:
      summary: Request a registration challenge
      operationId: requestRegistrationChallenge
      tags: [Agent]
      description: |
        First step of the agent registration flow. The server returns a
        random challenge that the agent must sign with its private key
        to prove ownership of the public key.

        Challenges expire after 5 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, agent_pubkey_b64]
              properties:
                agent_id:
                  type: string
                  description: The agent's chosen identifier.
                agent_pubkey_b64:
                  type: string
                  description: Base64-encoded SPKI DER Ed25519 public key.
                owner_principal_id:
                  type: string
                  format: uuid
                  description: UUID of the owner to register under.
      responses:
        "200":
          description: Challenge issued.
          content:
            application/json:
              schema:
                type: object
                required: [challenge_id, challenge_b64, expires_at]
                properties:
                  challenge_id:
                    type: string
                    format: uuid
                  challenge_b64:
                    type: string
                    description: Base64-encoded random challenge bytes.
                  expires_at:
                    type: string
                    format: date-time

  /v1/agents/register:
    post:
      summary: Register agent with signed challenge
      operationId: registerAgent
      tags: [Agent]
      description: |
        Second step of registration. The agent presents its signed
        challenge to prove it controls the private key. On success, the
        server creates the agent record and returns the assigned
        `agent_principal_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, agent_id, agent_pubkey_b64, signature_b64, owner_principal_id]
              properties:
                challenge_id:
                  type: string
                  format: uuid
                agent_id:
                  type: string
                agent_pubkey_b64:
                  type: string
                signature_b64:
                  type: string
                  description: Base64-encoded Ed25519 signature over the raw challenge bytes.
                owner_principal_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Agent registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistration"

  /v1/authorize:
    post:
      summary: Authorize an action
      operationId: authorize
      tags: [Agent]
      description: |
        Main authorization endpoint. The agent submits a signed action
        request and receives a decision (`ALLOW`, `DENY`,
        `REQUIRE_APPROVAL`, `REQUIRE_STEP_UP`, `REQUIRE_DEPOSIT`).

        When the decision is `ALLOW`, a PASETO v4.public proof token is
        included that the agent can present to counterparties.

        When the decision is `REQUIRE_APPROVAL`, the agent should create
        an approval request via `POST /v1/agent/approval-requests`, wait
        for owner approval, then re-authorize with the `approval_token`.

        **Approval token re-authorization**: Include `approval_token` in
        the request body alongside the original action. The server
        verifies the token, checks the action hash matches, marks the
        approval as consumed (single-use), and issues a proof token.

        All five signing headers are required. See the protocol docs
        for the signing input format.
      parameters:
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ActionRequest"
                - type: object
                  properties:
                    approval_token:
                      type: string
                      description: |
                        Optional PASETO v4.public approval token from an approved
                        HUMAN_APPROVAL request. When present, the server bypasses
                        policy evaluation and directly issues a proof token if the
                        approval token is valid and the action hash matches.
      responses:
        "200":
          description: Authorization decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeResponse"
        "400":
          description: Invalid request or approval token error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Agent authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/self:
    get:
      summary: Get own agent info
      operationId: getAgentSelf
      tags: [Agent]
      description: |
        Returns the authenticated agent's own record. Requires Ed25519
        request signing.
      parameters:
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistration"

  /v1/agent/approval-requests:
    post:
      summary: Create approval request
      operationId: createApprovalRequest
      tags: [Agent]
      description: |
        Creates a human approval request for an action that received
        a `REQUIRE_APPROVAL` decision. The request is stored as PENDING
        and the owner can approve or deny it via the Owner API.

        Requires Ed25519 request signing.
      parameters:
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision_id, action]
              properties:
                decision_id:
                  type: string
                  format: uuid
                action:
                  $ref: "#/components/schemas/ActionRequest"
                justification:
                  type: string
                  description: Human-readable reason for the action.
                context:
                  type: object
                  description: Additional context for the owner's review.
      responses:
        "200":
          description: Approval request created.
          content:
            application/json:
              schema:
                type: object
                required: [approval_request_id, status, expires_at]
                properties:
                  approval_request_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [PENDING]
                  expires_at:
                    type: string
                    format: date-time

  /v1/agent/approval-requests/{approvalRequestId}:
    get:
      summary: Get approval request status
      operationId: getAgentApprovalRequest
      tags: [Agent]
      description: |
        Returns the status of an approval request. If the request has
        been approved, the response includes the `approval_token` that
        the agent should include in its re-authorization request.

        Scoped to the authenticated agent's own requests.
        Requires Ed25519 request signing.
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval request details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequestAgentView"

  /v1/agent/policy-drafts:
    post:
      summary: Submit a policy draft
      operationId: createPolicyDraft
      tags: [Agent]
      description: |
        Submits a draft policy for owner review. If approved, the draft
        becomes a real policy bound to the agent. The policy YAML is
        validated on submission.

        Requires Ed25519 request signing.
      parameters:
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_yaml]
              properties:
                policy_yaml:
                  type: string
                  description: The YAML policy document.
                applies_to_agent_principal_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Agent to bind the policy to (defaults to the requesting agent).
                justification:
                  type: string
                  nullable: true
                  description: Human-readable reason for proposing this policy.
      responses:
        "200":
          description: Policy draft created.
          content:
            application/json:
              schema:
                type: object
                required: [policy_draft_id, status, created_at]
                properties:
                  policy_draft_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [PENDING]
                  created_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid policy YAML.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: List own policy drafts
      operationId: listAgentPolicyDrafts
      tags: [Agent]
      description: |
        Lists policy drafts submitted by the authenticated agent.
        Optionally filter by status.

        Requires Ed25519 request signing.
      parameters:
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, DENIED]
          description: Filter by status.
      responses:
        "200":
          description: List of policy drafts.
          content:
            application/json:
              schema:
                type: object
                required: [policy_drafts]
                properties:
                  policy_drafts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDraftAgentView"

  /v1/agent/policy-drafts/{policyDraftId}:
    get:
      summary: Get policy draft status
      operationId: getAgentPolicyDraft
      tags: [Agent]
      description: |
        Returns the status of a policy draft. If approved, includes the
        resulting policy ID.

        Scoped to the authenticated agent's own drafts.
        Requires Ed25519 request signing.
      parameters:
        - $ref: "#/components/parameters/PolicyDraftId"
        - name: X-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Body-Sha256
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy draft details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyDraftAgentView"

  # ── Owner ───────────────────────────────────────────────────────────

  /v1/owner/setup:
    post:
      summary: Complete owner setup
      operationId: ownerSetup
      tags: [Owner]
      description: |
        Completes owner account setup using a one-time setup invite
        (generated by an admin). Sets the owner's passphrase for future
        login. The invite token is verified against its stored hash and
        marked as used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_id, invite_token, passphrase]
              properties:
                invite_id:
                  type: string
                  format: uuid
                  description: ID of the setup invite.
                invite_token:
                  type: string
                  description: The plaintext invite token (received from admin).
                passphrase:
                  type: string
                  description: The passphrase to set (minimum 8 characters).
      responses:
        "200":
          description: Setup complete.
          content:
            application/json:
              schema:
                type: object
                required: [status, owner_principal_id]
                properties:
                  status:
                    type: string
                    example: setup_complete
                  owner_principal_id:
                    type: string
                    format: uuid
        "400":
          description: Invalid request, invite used, invite expired, or weak passphrase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/owner/login:
    post:
      summary: Owner login
      operationId: ownerLogin
      tags: [Owner]
      description: |
        Authenticates an owner with their principal ID and passphrase.
        Returns a PASETO v4.public session token valid for the configured
        TTL (default 8 hours). The session is stateless — the token
        contains the owner's identity and expiry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_principal_id, passphrase]
              properties:
                owner_principal_id:
                  type: string
                  format: uuid
                passphrase:
                  type: string
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                type: object
                required: [token, expires_at, owner_principal_id]
                properties:
                  token:
                    type: string
                    description: PASETO v4.public session token (starts with `v4.public.`).
                  expires_at:
                    type: string
                    format: date-time
                  owner_principal_id:
                    type: string
                    format: uuid
        "401":
          description: Invalid credentials or setup not completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/owner/logout:
    post:
      summary: Owner logout
      operationId: ownerLogout
      tags: [Owner]
      description: |
        Logs out the owner. Since sessions are stateless (no server-side
        session store), this is primarily an audit event. Clients should
        discard the session token.
      security:
        - OwnerSession: []
      responses:
        "200":
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: logged_out

  /v1/owner/profile:
    get:
      summary: Get owner profile
      operationId: getOwnerProfile
      tags: [Owner]
      description: |
        Returns the authenticated owner's profile. Sensitive fields
        (passphrase hash/salt) are stripped from the response.
      security:
        - OwnerSession: []
      responses:
        "200":
          description: Owner profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"
    put:
      summary: Update owner profile
      operationId: updateOwnerProfile
      tags: [Owner]
      description: |
        Updates the authenticated owner's profile fields including
        display name, contact identities, government IDs, company IDs,
        signatories, and signatory rules. Identity validation is applied
        and assurance level is recomputed.
      security:
        - OwnerSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                contact_identities:
                  type: array
                  items:
                    $ref: "#/components/schemas/ContactIdentity"
                government_ids:
                  type: array
                  items:
                    $ref: "#/components/schemas/GovernmentId"
                company_ids:
                  type: array
                  items:
                    $ref: "#/components/schemas/CompanyId"
                signatories:
                  type: array
                  items:
                    $ref: "#/components/schemas/Signatory"
                signatory_rules:
                  type: array
                  items:
                    $ref: "#/components/schemas/SignatoryRule"
      responses:
        "200":
          description: Updated owner profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"

  /v1/owner/agents:
    get:
      summary: List owner's agents
      operationId: listOwnerAgents
      tags: [Owner]
      description: |
        Returns all agents belonging to the authenticated owner.
      security:
        - OwnerSession: []
      responses:
        "200":
          description: Agent list.
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentRegistration"

  /v1/owner/agents/{agentId}:
    put:
      summary: Update agent status
      operationId: updateOwnerAgent
      tags: [Owner]
      description: |
        Updates an agent's status (e.g., revoke). Only agents belonging
        to the authenticated owner can be updated. Cross-owner access
        returns 404.
      security:
        - OwnerSession: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The agent's `agent_principal_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ACTIVE, REVOKED]
      responses:
        "200":
          description: Agent updated.
          content:
            application/json:
              schema:
                type: object
                required: [agent_principal_id, agent_id, status]
                properties:
                  agent_principal_id:
                    type: string
                    format: uuid
                  agent_id:
                    type: string
                  status:
                    type: string
        "404":
          description: Agent not found or not owned by this owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/owner/policies:
    get:
      summary: List owner's policies
      operationId: listOwnerPolicies
      tags: [Owner]
      description: |
        Returns all policies belonging to the authenticated owner,
        including their YAML content.
      security:
        - OwnerSession: []
      responses:
        "200":
          description: Policy list.
          content:
            application/json:
              schema:
                type: object
                required: [policies]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyEntry"
    post:
      summary: Create policy
      operationId: createOwnerPolicy
      tags: [Owner]
      description: |
        Creates a new policy owned by the authenticated owner. The YAML
        is validated against the policy schema. Optionally binds the
        policy to a specific agent.
      security:
        - OwnerSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_yaml]
              properties:
                policy_yaml:
                  type: string
                  description: The policy YAML content.
                applies_to_agent_principal_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: If set, binds this policy to a specific agent.
      responses:
        "200":
          description: Policy created.
          content:
            application/json:
              schema:
                type: object
                required: [policy_id, owner_principal_id]
                properties:
                  policy_id:
                    type: string
                    format: uuid
                  owner_principal_id:
                    type: string
                    format: uuid
                  applies_to_agent_principal_id:
                    type: string
                    format: uuid
                    nullable: true

  /v1/owner/policies/{policyId}:
    get:
      summary: Get policy
      operationId: getOwnerPolicy
      tags: [Owner]
      description: |
        Returns a specific policy owned by the authenticated owner.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Policy details with YAML content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyEntry"
        "404":
          description: Policy not found or not owned by this owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update policy
      operationId: updateOwnerPolicy
      tags: [Owner]
      description: |
        Updates the YAML content of a policy owned by the authenticated
        owner. The new YAML is validated against the policy schema.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_yaml]
              properties:
                policy_yaml:
                  type: string
      responses:
        "200":
          description: Policy updated.
          content:
            application/json:
              schema:
                type: object
                required: [policy_id, status]
                properties:
                  policy_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: updated
    delete:
      summary: Delete policy
      operationId: deleteOwnerPolicy
      tags: [Owner]
      description: |
        Deletes a policy owned by the authenticated owner. Also removes
        any bindings referencing this policy.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Policy deleted.
          content:
            application/json:
              schema:
                type: object
                required: [policy_id, status]
                properties:
                  policy_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: deleted

  /v1/owner/approval-requests:
    get:
      summary: List approval requests
      operationId: listOwnerApprovalRequests
      tags: [Owner]
      description: |
        Returns approval requests for the authenticated owner. Supports
        filtering by status via query parameter.
      security:
        - OwnerSession: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, DENIED, EXPIRED]
          description: Filter by approval request status.
      responses:
        "200":
          description: Approval request list.
          content:
            application/json:
              schema:
                type: object
                required: [approval_requests]
                properties:
                  approval_requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalRequestOwnerView"

  /v1/owner/approval-requests/{approvalRequestId}:
    get:
      summary: Get approval request details
      operationId: getOwnerApprovalRequest
      tags: [Owner]
      description: |
        Returns the full details of an approval request, including the
        action and justification.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
      responses:
        "200":
          description: Approval request details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequestOwnerView"
        "404":
          description: Approval request not found or not owned by this owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/owner/approval-requests/{approvalRequestId}/approve:
    post:
      summary: Approve request
      operationId: approveApprovalRequest
      tags: [Owner]
      description: |
        Approves a pending approval request and generates a single-use
        PASETO v4.public approval token. The agent includes this token
        in its re-authorization request to receive a proof token.

        The approval token is action-scoped (bound to the specific
        action hash) and time-limited (configurable TTL, default 1 hour).
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
      responses:
        "200":
          description: Request approved with approval token.
          content:
            application/json:
              schema:
                type: object
                required: [approval_request_id, status, approval_token, approval_token_expires_at]
                properties:
                  approval_request_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [APPROVED]
                  approval_token:
                    type: string
                    description: PASETO v4.public approval token (starts with `v4.public.`).
                  approval_token_expires_at:
                    type: string
                    format: date-time

  /v1/owner/approval-requests/{approvalRequestId}/deny:
    post:
      summary: Deny request
      operationId: denyApprovalRequest
      tags: [Owner]
      description: |
        Denies a pending approval request. An optional reason can be
        provided for the agent.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason for denial.
      responses:
        "200":
          description: Request denied.
          content:
            application/json:
              schema:
                type: object
                required: [approval_request_id, status]
                properties:
                  approval_request_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [DENIED]

  /v1/owner/policy-drafts:
    get:
      summary: List policy drafts
      operationId: listOwnerPolicyDrafts
      tags: [Owner]
      description: |
        Lists policy drafts submitted by agents belonging to the
        authenticated owner. Optionally filter by status.
      security:
        - OwnerSession: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, DENIED]
          description: Filter by status.
      responses:
        "200":
          description: List of policy drafts.
          content:
            application/json:
              schema:
                type: object
                required: [policy_drafts]
                properties:
                  policy_drafts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDraftOwnerView"

  /v1/owner/policy-drafts/{policyDraftId}:
    get:
      summary: Get policy draft
      operationId: getOwnerPolicyDraft
      tags: [Owner]
      description: |
        Returns the full details of a policy draft, including the
        proposed YAML and agent information.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/PolicyDraftId"
      responses:
        "200":
          description: Policy draft details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyDraftOwnerView"

  /v1/owner/policy-drafts/{policyDraftId}/approve:
    post:
      summary: Approve policy draft
      operationId: approvePolicyDraft
      tags: [Owner]
      description: |
        Approves a pending policy draft. Creates a real policy from the
        draft YAML and binds it to the target agent. The draft status
        is set to APPROVED and the resulting policy ID is recorded.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/PolicyDraftId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                totp_code:
                  type: string
                  description: TOTP code if 2FA is enabled.
      responses:
        "200":
          description: Draft approved, policy created and bound.
          content:
            application/json:
              schema:
                type: object
                required: [policy_draft_id, status, resulting_policy_id]
                properties:
                  policy_draft_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [APPROVED]
                  resulting_policy_id:
                    type: string
                    format: uuid
                    description: The ID of the newly created policy.
        "400":
          description: Draft already resolved or invalid YAML.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/owner/policy-drafts/{policyDraftId}/deny:
    post:
      summary: Deny policy draft
      operationId: denyPolicyDraft
      tags: [Owner]
      description: |
        Denies a pending policy draft. An optional reason can be
        provided for the agent.
      security:
        - OwnerSession: []
      parameters:
        - $ref: "#/components/parameters/PolicyDraftId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason for denial.
                totp_code:
                  type: string
                  description: TOTP code if 2FA is enabled.
      responses:
        "200":
          description: Draft denied.
          content:
            application/json:
              schema:
                type: object
                required: [policy_draft_id, status]
                properties:
                  policy_draft_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [DENIED]
        "400":
          description: Draft already resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/owner/audit:
    get:
      summary: Owner audit log
      operationId: getOwnerAudit
      tags: [Owner]
      description: |
        Returns audit log events related to the authenticated owner
        and their agents. Events are filtered server-side to only
        include entries for this owner's resources.
      security:
        - OwnerSession: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Filtered audit log.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
                  next_cursor:
                    type: integer
                    nullable: true

  # ── Admin ───────────────────────────────────────────────────────────

  /v1/admin/owners:
    get:
      summary: List all owners
      operationId: listOwners
      tags: [Admin]
      description: |
        Returns all owner principals in the system.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of owners.
          content:
            application/json:
              schema:
                type: object
                required: [owners]
                properties:
                  owners:
                    type: array
                    items:
                      $ref: "#/components/schemas/Owner"
    post:
      summary: Create a new owner
      operationId: createOwner
      tags: [Admin]
      description: |
        Creates a new owner principal. After creation, use
        `POST /v1/admin/owners/{ownerId}/setup-invite` to generate a
        setup invite for the owner.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [principal_type, display_name]
              properties:
                principal_type:
                  type: string
                  enum: [HUMAN, ORG]
                display_name:
                  type: string
                contact_identities:
                  type: array
                  items:
                    $ref: "#/components/schemas/ContactIdentity"
                government_ids:
                  type: array
                  items:
                    $ref: "#/components/schemas/GovernmentId"
                company_ids:
                  type: array
                  items:
                    $ref: "#/components/schemas/CompanyId"
                signatories:
                  type: array
                  items:
                    $ref: "#/components/schemas/Signatory"
                signatory_rules:
                  type: array
                  items:
                    $ref: "#/components/schemas/SignatoryRule"
      responses:
        "200":
          description: Owner created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"

  /v1/admin/owners/{ownerId}/setup-invite:
    post:
      summary: Generate setup invite
      operationId: createSetupInvite
      tags: [Admin]
      description: |
        Generates a one-time setup invite for an owner. The plaintext
        invite token is returned once and cannot be retrieved again.
        The owner uses this token with `POST /v1/owner/setup` to set
        their passphrase.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OwnerId"
      responses:
        "200":
          description: Invite created.
          content:
            application/json:
              schema:
                type: object
                required: [invite_id, invite_token, expires_at]
                properties:
                  invite_id:
                    type: string
                    format: uuid
                  invite_token:
                    type: string
                    description: Plaintext invite token (one-time, give to owner securely).
                  expires_at:
                    type: string
                    format: date-time

  /v1/admin/owners/{ownerId}:
    delete:
      summary: Delete owner
      operationId: deleteOwner
      tags: [Admin]
      description: |
        Removes an owner from the system state. Does not delete
        associated agents or policies.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OwnerId"
      responses:
        "200":
          description: Owner deleted.
          content:
            application/json:
              schema:
                type: object
                required: [owner_principal_id, status]
                properties:
                  owner_principal_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: deleted

  /v1/admin/agents:
    get:
      summary: List all agents
      operationId: listAgents
      tags: [Admin]
      description: Returns all registered agents across all owners.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of agents.
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentRegistration"

  /v1/admin/policies:
    get:
      summary: List all policies
      operationId: listPolicies
      tags: [Admin]
      description: Returns all policies across all owners (read-only view).
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of policies.
          content:
            application/json:
              schema:
                type: object
                required: [policies]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyEntry"

  /v1/admin/policies/{policyId}:
    get:
      summary: Get policy details
      operationId: getPolicy
      tags: [Admin]
      description: Returns a specific policy with its YAML content (read-only).
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Policy with YAML.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyEntry"
        "404":
          description: Policy not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/audit:
    get:
      summary: Full audit log
      operationId: getAuditLog
      tags: [Admin]
      description: Returns the complete audit log (unfiltered).
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
                  next_cursor:
                    type: integer
                    nullable: true

  /v1/admin/config:
    get:
      summary: Get server configuration
      operationId: getConfig
      tags: [Admin]
      description: |
        Returns the merged server configuration (defaults + config.yaml).
        Sensitive values (admin token) are redacted.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Server configuration.
          content:
            application/json:
              schema:
                type: object
                description: Full configuration object (structure varies).

  /v1/admin/state:
    get:
      summary: Get full state
      operationId: getState
      tags: [Admin]
      description: |
        Returns the full system state including owners, agents, policies,
        bindings, and server keys. This is the authoritative index.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Full state data.
          content:
            application/json:
              schema:
                type: object
                description: Complete StateData object.

  # ── Playground ──────────────────────────────────────────────────────

  /v1/playground/run:
    post:
      summary: Run a policy evaluation (sandbox)
      operationId: playgroundRun
      tags: [Playground]
      description: |
        Evaluates an action against a policy in sandbox mode — no real
        agent, no state mutation, no proof token issued. Returns the
        decision plus a rule-by-rule evaluation trace for debugging.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_yaml, action]
              properties:
                policy_yaml:
                  type: string
                  description: The policy YAML to evaluate.
                action:
                  $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Evaluation result with trace.
          content:
            application/json:
              schema:
                type: object
                required: [result, matched_rule_id, reason, action_hash, obligations, trace]
                properties:
                  result:
                    type: string
                    enum: [ALLOW, DENY, REQUIRE_APPROVAL, REQUIRE_STEP_UP, REQUIRE_DEPOSIT]
                  matched_rule_id:
                    type: string
                    nullable: true
                  reason:
                    type: string
                  action_hash:
                    type: string
                  obligations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Obligation"
                  trace:
                    type: array
                    items:
                      $ref: "#/components/schemas/RuleTrace"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Admin token configured in `config.yaml` under `admin.token`.
        Required when `admin.mode` is `token` or for remote access in
        `localhost_or_token` mode.

    OwnerSession:
      type: http
      scheme: bearer
      description: |
        PASETO v4.public session token issued by `POST /v1/owner/login`.
        Contains `purpose: 'owner_session'` claim to distinguish from
        proof tokens. Default TTL is 8 hours (configurable via
        `sessions.ttl_seconds` in `config.yaml`).

  parameters:
    OwnerId:
      name: ownerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the owner principal.
    PolicyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the policy.
    ApprovalRequestId:
      name: approvalRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the approval request.
    PolicyDraftId:
      name: policyDraftId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the policy draft.

  schemas:
    Error:
      type: object
      description: Standard error envelope returned by all endpoints on failure.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. `INVALID_REQUEST`, `AGENT_NOT_FOUND`).
            message:
              type: string
              description: Human-readable error message.
            details:
              type: object
              description: Additional structured details (e.g. Zod validation errors).

    PublicKey:
      type: object
      description: An Ed25519 public key used by the server to sign PASETO tokens.
      required: [kid, kty, alg, public_key_b64, created_at]
      properties:
        kid:
          type: string
          description: Key ID (unique identifier for this key).
        kty:
          type: string
          example: OKP
          description: Key type. Always `OKP` (Octet Key Pair) for Ed25519.
        alg:
          type: string
          example: EdDSA
          description: Algorithm. Always `EdDSA` for Ed25519.
        public_key_b64:
          type: string
          description: Base64-encoded Ed25519 public key bytes.
        created_at:
          type: string
          format: date-time
          description: When this key was generated.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: When this key was revoked, or null if still active.

    ActionRequest:
      type: object
      description: |
        An action the agent wants to perform. This is the input to the
        authorization engine which evaluates it against the bound policy.
      required: [action_type, principal, payload]
      properties:
        action_id:
          type: string
          format: uuid
          description: Unique ID for this action. Auto-generated if omitted.
        action_type:
          type: string
          description: The type of action (e.g. `transfer`, `purchase`, `sign`). Matched against policy rule patterns.
        requested_at:
          type: string
          format: date-time
          description: When the action was requested. Defaults to current time.
        principal:
          type: object
          required: [agent_id]
          description: The agent requesting the action.
          properties:
            agent_id:
              type: string
              description: The agent's registered `agent_id`.
        subject:
          type: object
          description: The owner principal on whose behalf the agent is acting.
          properties:
            principal_id:
              type: string
              format: uuid
        resource:
          type: object
          description: The resource being acted upon.
          properties:
            resource_id:
              type: string
            resource_type:
              type: string
        relying_party:
          type: object
          description: The counterparty that will receive the proof token.
          properties:
            rp_id:
              type: string
              format: uuid
            domain:
              type: string
            trust_profile:
              type: string
              enum: [LOW, MEDIUM, HIGH, REGULATED]
              description: Trust tier of the counterparty. Included in proof token claims.
        payload:
          type: object
          description: Action-specific data evaluated by policy constraints (e.g. `amount`, `currency`).
        context:
          type: object
          description: Additional context available to policy expressions (e.g. IP address, device info).

    Obligation:
      type: object
      description: |
        A condition that must be fulfilled before the action can proceed.
        Returned when the decision is `REQUIRE_APPROVAL`, `REQUIRE_STEP_UP`,
        or `REQUIRE_DEPOSIT`.
      required: [obligation_id, type, status]
      properties:
        obligation_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [HUMAN_APPROVAL, STEP_UP_AUTH, DEPOSIT, COUNTERPARTY_ATTESTATION]
          description: The kind of obligation that must be fulfilled.
        status:
          type: string
          enum: [PENDING, FULFILLED, WAIVED]
        details_json:
          type: object
          description: Obligation-specific details (e.g. required deposit amount).

    AuthorizeResponse:
      type: object
      description: |
        The authorization decision. When `result` is `ALLOW`, a PASETO
        proof token is included that the agent can present to counterparties.
      required: [decision_id, action_id, action_hash, result, matched_rule_id, reason, proof_token, proof_expires_at, obligations]
      properties:
        decision_id:
          type: string
          format: uuid
          description: Unique ID for this decision (recorded in audit log).
        action_id:
          type: string
          format: uuid
        action_hash:
          type: string
          description: SHA-256 hash of the canonicalized action. Used for proof verification.
        result:
          type: string
          enum: [ALLOW, DENY, REQUIRE_APPROVAL, REQUIRE_STEP_UP, REQUIRE_DEPOSIT]
          description: The authorization decision.
        matched_rule_id:
          type: string
          nullable: true
          description: ID of the policy rule that produced this decision, or null if no rule matched.
        reason:
          type: string
          description: Human-readable explanation of the decision.
        proof_token:
          type: string
          nullable: true
          description: PASETO v4.public token. Present only when `result` is `ALLOW`.
        proof_expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration time of the proof token.
        obligations:
          type: array
          items:
            $ref: "#/components/schemas/Obligation"
          description: Obligations that must be fulfilled (empty array when `result` is `ALLOW` or `DENY`).

    AgentRegistration:
      type: object
      description: A registered AI agent.
      required: [agent_principal_id, agent_id, owner_principal_id, status, created_at]
      properties:
        agent_principal_id:
          type: string
          format: uuid
          description: Server-assigned UUID for this agent.
        agent_id:
          type: string
          description: The agent's self-chosen identifier.
        owner_principal_id:
          type: string
          format: uuid
          description: UUID of the owner this agent belongs to.
        status:
          type: string
          description: Agent status (e.g. `ACTIVE`, `REVOKED`).
        created_at:
          type: string
          format: date-time

    Owner:
      type: object
      description: An owner principal (human or organization) that holds policies and owns agents.
      required: [owner_principal_id, principal_type, display_name, status, created_at]
      properties:
        owner_principal_id:
          type: string
          format: uuid
        principal_type:
          type: string
          enum: [HUMAN, ORG]
        display_name:
          type: string
        status:
          type: string
        identity_assurance_level:
          type: integer
          description: Computed assurance level based on verified identity data (0-3).
        created_at:
          type: string
          format: date-time

    ContactIdentity:
      type: object
      description: A contact method (email, phone, etc.) attached to an owner.
      properties:
        contact_id:
          type: string
          format: uuid
          description: Auto-generated if not provided.
        type:
          type: string
          enum: [EMAIL, PHONE, WEBSITE]
        value:
          type: string
        verified:
          type: boolean
        added_at:
          type: string
          format: date-time

    GovernmentId:
      type: object
      description: A government-issued ID (passport, national ID, etc.) for a HUMAN owner.
      properties:
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
        id_type:
          type: string
          description: Type of government ID (e.g. `PERSONNUMMER`, `SSN`, `PASSPORT`).
        id_value:
          type: string
        verification_status:
          type: string
          enum: [UNVERIFIED, FORMAT_VALID, VERIFIED]
          description: Automatically upgraded to `FORMAT_VALID` if the format passes validation.
        added_at:
          type: string
          format: date-time

    CompanyId:
      type: object
      description: A company registration number (LEI, DUNS, etc.) for an ORG owner.
      properties:
        id_type:
          type: string
          description: Type of company ID (e.g. `LEI`, `DUNS`, `SE_ORGNR`).
        id_value:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
        verification_status:
          type: string
          enum: [UNVERIFIED, FORMAT_VALID, VERIFIED]
        added_at:
          type: string
          format: date-time

    Signatory:
      type: object
      description: An authorized signatory for an ORG owner, referencing a HUMAN owner.
      properties:
        signatory_id:
          type: string
          format: uuid
          description: Auto-generated if not provided.
        human_principal_id:
          type: string
          format: uuid
          description: UUID of the HUMAN owner principal who is the signatory.
        role:
          type: string
          description: Role of the signatory (e.g. `CEO`, `CFO`, `DIRECTOR`).
        added_at:
          type: string
          format: date-time

    SignatoryRule:
      type: object
      description: A quorum or approval rule governing when an ORG owner's actions are authorized.
      properties:
        rule_id:
          type: string
          format: uuid
          description: Auto-generated if not provided.
        rule_type:
          type: string
          description: Type of rule (e.g. `QUORUM`).
        min_signatories:
          type: integer
          description: Minimum number of signatories required.
        required_roles:
          type: array
          items:
            type: string
          description: Roles that must be represented among the signatories.

    PolicyEntry:
      type: object
      description: A stored authorization policy with its binding information.
      required: [policy_id, owner_principal_id, path]
      properties:
        policy_id:
          type: string
          format: uuid
        owner_principal_id:
          type: string
          format: uuid
        applies_to_agent_principal_id:
          type: string
          format: uuid
          nullable: true
          description: If set, this policy only applies to this specific agent.
        path:
          type: string
          description: File path of the stored policy YAML relative to the data directory.
        policy_yaml:
          type: string
          description: The full YAML content of the policy (present on GET, absent on list errors).
        error:
          type: string
          description: Present instead of `policy_yaml` if the file could not be read.

    ApprovalRequestAgentView:
      type: object
      description: Agent-facing view of an approval request.
      required: [approval_request_id, status, action_type, action_hash, created_at, expires_at]
      properties:
        approval_request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED, EXPIRED]
        action_type:
          type: string
        action_hash:
          type: string
        justification:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        denial_reason:
          type: string
          nullable: true
        approval_token:
          type: string
          description: Present only when status is APPROVED.
        approval_token_expires_at:
          type: string
          format: date-time
          description: Present only when status is APPROVED.

    ApprovalRequestOwnerView:
      type: object
      description: Owner-facing view of an approval request with full action details.
      required: [approval_request_id, status, agent_id, action_type, created_at, expires_at]
      properties:
        approval_request_id:
          type: string
          format: uuid
        decision_id:
          type: string
          format: uuid
        agent_principal_id:
          type: string
          format: uuid
        agent_id:
          type: string
        owner_principal_id:
          type: string
          format: uuid
        action_type:
          type: string
        action_hash:
          type: string
        action:
          $ref: "#/components/schemas/ActionRequest"
        justification:
          type: string
          nullable: true
        context:
          type: object
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED, EXPIRED]
        approval_token:
          type: string
          nullable: true
        approval_token_expires_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
        denial_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    PolicyDraftAgentView:
      type: object
      description: Agent-facing view of a policy draft.
      required: [policy_draft_id, status, created_at]
      properties:
        policy_draft_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED]
        policy_yaml:
          type: string
        applies_to_agent_principal_id:
          type: string
          format: uuid
          nullable: true
        justification:
          type: string
          nullable: true
        resulting_policy_id:
          type: string
          format: uuid
          nullable: true
          description: Present only when status is APPROVED.
        denial_reason:
          type: string
          nullable: true
          description: Present only when status is DENIED.
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true

    PolicyDraftOwnerView:
      type: object
      description: Owner-facing view of a policy draft with full details.
      required: [policy_draft_id, agent_id, agent_principal_id, status, policy_yaml, created_at]
      properties:
        policy_draft_id:
          type: string
          format: uuid
        agent_id:
          type: string
        agent_principal_id:
          type: string
          format: uuid
        owner_principal_id:
          type: string
          format: uuid
        applies_to_agent_principal_id:
          type: string
          format: uuid
          nullable: true
        policy_yaml:
          type: string
        justification:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED]
        resulting_policy_id:
          type: string
          format: uuid
          nullable: true
        denial_reason:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    AuditEvent:
      type: object
      description: |
        An entry in the append-only audit log. Every authorization decision,
        registration, key rotation, and admin mutation is recorded.
      required: [event_id, timestamp, event_type]
      properties:
        event_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        event_type:
          type: string
          description: |
            Event type, e.g. `AUTHORIZE_CALLED`, `PROOF_ISSUED`,
            `DECISION_CREATED`, `AGENT_REGISTERED`, `OWNER_CREATED`,
            `POLICY_UPSERTED`, `OWNER_LOGIN`, `OWNER_LOGOUT`,
            `APPROVAL_REQUEST_CREATED`, `APPROVAL_REQUEST_APPROVED`,
            `APPROVAL_REQUEST_DENIED`, `APPROVAL_TOKEN_USED`,
            `SERVER_STARTED`.
        principal_id:
          type: string
          format: uuid
          nullable: true
        action_id:
          type: string
          format: uuid
          nullable: true
        decision_id:
          type: string
          format: uuid
          nullable: true
        metadata_json:
          type: object
          description: Event-specific details.

    RuleTrace:
      type: object
      description: Debug trace for a single policy rule during playground evaluation.
      required: [rule_id, pattern_match, when_match, constraints_match, final_match]
      properties:
        rule_id:
          type: string
          description: ID of the rule from the policy YAML.
        pattern_match:
          type: boolean
          description: Whether the rule's action_type pattern matched the request.
        when_match:
          type: boolean
          nullable: true
          description: Whether the rule's `when` expression evaluated to true (null if no `when` clause).
        constraints_match:
          type: boolean
          nullable: true
          description: Whether all constraints were satisfied (null if no constraints).
        final_match:
          type: boolean
          description: Whether this rule was the one that produced the decision.
