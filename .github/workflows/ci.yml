name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest tests/ -v

  go-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-go
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Download dependencies
        run: go mod tidy

      - name: Test
        run: go test -v ./...

  publish-npm:
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @openleash/core
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/core
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

      - name: Publish @openleash/gui
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/gui
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

      - name: Publish @openleash/server
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/server
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

      - name: Publish @openleash/cli
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/cli
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

      - name: Publish @openleash/sdk-ts
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/sdk-ts
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: python-sdk
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: packages/sdk-python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist/

  docker:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/openleash/openleash
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
